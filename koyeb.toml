# Configuración de Koyeb para Dream Lodge MCP Server
# Este archivo es opcional pero ayuda a configurar el despliegue

[build]
# Forzar el uso de Docker en lugar de buildpacks
type = "docker"

[deploy]
# Configuración de despliegue
# healthcheck_path = "/health"  # Comentado - Koyeb detectará automáticamente si el servidor responde
# healthcheck_interval = 30

# Comando de ejecución (si se usan buildpacks en lugar de Docker)
# Si usas Docker, el CMD del Dockerfile se usará automáticamente
run = "python primer_servidor/mcp_server.py"

# Variables de entorno (se configuran en el dashboard de Koyeb)
# No las pongas aquí por seguridad, úsalas en el dashboard:
# - MONGO_URI
# - DB_NAME
# - PORT (Koyeb lo asigna automáticamente)
